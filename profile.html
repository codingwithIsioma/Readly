<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Readly</title>
    <!-- STYLESHEETS -->
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/nav.css" />
    <link rel="stylesheet" href="./css/profile.css" />

    <!-- EXTERNAL STYLESHEETS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/6a9f6daa92.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <nav class="sign-up-nav">
          <h2 class="logo"><a href="./home.html">Readly</a></h2>
          <div class="nav-links">
            <a href="./home.html">Home</a>
            <a href="./bookmarks.html">Bookmarks</a>
            <a href="./search.html">Search</a>
            <a href="./profile.html" class="active">Profile</a>
          </div>
          <div class="avatar" id="avatar">AK</div>
        </nav>
      </header>
      <main>
        <div class="profile-section">
          <div class="profile-details">
            <div class="profile">
              <div class="profile-avatar">AK</div>
              <div class="profile-meta">
                <h3 class="profile-name">Anna Krause</h3>
                <p class="profile-email">annakrause@gmail.com</p>
                <p class="joined">
                  Member since <span id="joinedBy">May 2026</span>
                </p>
              </div>
            </div>
            <button type="button" class="sign-out">Sign out</button>
          </div>

          <div class="stats">
            <div class="stat-item">
              <p class="stat-value">12</p>
              <p class="stat-tag">ARTICLES READ</p>
            </div>
            <div class="stat-item">
              <p class="stat-value">2</p>
              <p class="stat-tag">BOOKMARKS</p>
            </div>
            <div class="stat-item">
              <p class="stat-value">7</p>
              <p class="stat-tag">DAY STREAK</p>
            </div>
          </div>

          <div class="favorite-topics-section">
            <p>YOUR FAVOURITE TOPICS</p>
            <div class="favorite-topics">
              <div class="favorite-topic">Design</div>
              <div class="favorite-topic">Philosophy</div>
              <div class="favorite-topic">Technology</div>
            </div>
          </div>

          <div class="account">
            <p>ACCOUNT</p>
            <button type="button" class="delete-account">Delete Account</button>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
