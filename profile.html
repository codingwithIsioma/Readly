<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Readly</title>
    <!-- STYLESHEETS -->
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/nav.css" />
    <link rel="stylesheet" href="./css/profile.css" />

    <!-- EXTERNAL STYLESHEETS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/6a9f6daa92.js"
      crossorigin="anonymous"
    ></script>

    <!-- SCRIPTS -->
    <script src="./js/classes/User.js" defer></script>
    <script src="./js/classes/StreakTracker.js" defer></script>
    <script src="./js/classes/Article.js" defer></script>
    <script src="./js/classes/TopicTracker.js" defer></script>
    <script src="./js/classes/BookmarkManager.js" defer></script>
    <script src="./js/nav.js" defer></script>
    <script src="./js/profile.js" defer></script>
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <nav class="sign-up-nav">
          <h2 class="logo"><a href="./home.html">Readly</a></h2>
          <div class="nav-links">
            <a href="./home.html">Home</a>
            <a href="./bookmarks.html">Bookmarks</a>
            <a href="./search.html">Search</a>
            <a href="./profile.html">Profile</a>
          </div>
          <div class="avatar" id="avatar"></div>
        </nav>
      </header>
      <main>
        <div class="profile-section">
          <div class="profile-details">
            <div class="profile">
              <div class="profile-avatar"></div>
              <div class="profile-meta">
                <h3 class="profile-name"></h3>
                <p class="profile-email"></p>
                <p class="joined">Member since <span id="joinedBy"></span></p>
              </div>
            </div>
            <button type="button" class="sign-out" id="sign-out">
              Sign out
            </button>
          </div>

          <div class="stats">
            <div class="stat-item">
              <p class="stat-value" id="articles-read">-</p>
              <p class="stat-tag">ARTICLES READ</p>
            </div>
            <div class="stat-item">
              <p class="stat-value" id="bookmarks-count">-</p>
              <p class="stat-tag">BOOKMARKS</p>
            </div>
            <div class="stat-item">
              <p class="stat-value" id="streak-count">-</p>
              <p class="stat-tag">DAY STREAK</p>
            </div>
          </div>

          <div class="favorite-topics-section">
            <p>YOUR FAVOURITE TOPICS</p>
            <div class="favorite-topics">
              <p class="no-favorite-topics">You should read more!</p>
            </div>
          </div>

          <div class="account">
            <p>ACCOUNT</p>
            <button type="button" class="delete-account" id="delete-account">
              Delete Account
            </button>
          </div>

          <div class="modal-overlay" id="delete-modal">
            <div class="modal">
              <div class="modal-icon">⚠️</div>
              <h2 class="modal-title">Delete your account?</h2>
              <p class="modal-body">
                This will permanently delete your account, bookmarks, reading
                streak, and all your data. This action cannot be undone.
              </p>
              <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" id="cancel-delete">
                  Cancel
                </button>
                <button class="modal-btn modal-btn-confirm" id="confirm-delete">
                  Yes, delete my account
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
